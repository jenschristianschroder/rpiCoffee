name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check app/ services/

  test-app:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install -r requirements-dev.txt
      - name: Run app tests
        run: >
          pytest tests/app/
          --cov=app --cov-report=xml --cov-report=term-missing
          -x -q
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-app
          path: coverage.xml

  test-classifier:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r services/classifier/requirements.txt
          pip install -r requirements-dev.txt
      - name: Run classifier tests
        run: pytest tests/services/classifier/ -x -q

  test-llm-ollama:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install fastapi uvicorn httpx pydantic
          pip install -r requirements-dev.txt
      - name: Run llm-ollama tests
        run: pytest tests/services/llm_ollama/ -x -q

  test-remote-save:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r services/remote-save/requirements.txt
          pip install -r requirements-dev.txt
      - name: Run remote-save tests
        run: pytest tests/services/remote_save/ -x -q
