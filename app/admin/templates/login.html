{% extends "base.html" %}
{% block title %}Login – rpiCoffee{% endblock %}

{% block content %}
<section style="max-width: 400px; margin: 4rem auto;">
    <hgroup>
        <h2>&#9749; rpiCoffee Admin</h2>
        <p>Enter password to continue</p>
    </hgroup>

    {% if error %}
    <p style="color: var(--pico-del-color);">{{ error }}</p>
    {% endif %}

    <form method="post" action="/admin/login">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter admin password" required autofocus>
        <button type="submit">Login</button>
    </form>
</section>
{% endblock %}
