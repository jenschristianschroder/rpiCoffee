{% extends "base.html" %}
{% block title %}Login – rpiCoffee{% endblock %}

{% block head %}
<style>
    .login-section { max-width: 360px; margin: 2rem auto; }
    .login-section hgroup { text-align: center; }
    .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin: 0.75rem 0; }
    .numpad button {
        font-size: 1.6rem; padding: 0.8rem 0; border-radius: 0.5rem;
        border: 1px solid var(--pico-muted-border-color);
        background: var(--pico-card-background-color); color: var(--pico-color);
        cursor: pointer; touch-action: manipulation;
        -webkit-tap-highlight-color: transparent; user-select: none;
        transition: background 0.15s;
    }
    .numpad button:active { background: var(--pico-primary-background); }
    .numpad .btn-clear { font-size: 1.1rem; }
    .numpad .btn-back { font-size: 1.3rem; }
    #password { font-size: 1.2rem; text-align: center; letter-spacing: 0.3rem; }
    .back-link { text-align: center; margin-top: 1rem; }
    .back-link a { color: var(--pico-muted-color); font-size: 0.85rem; text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<section class="login-section">
    <hgroup>
        <h2>&#9749; rpiCoffee Admin</h2>
        <p>Enter PIN to continue</p>
    </hgroup>

    {% if error %}
    <p style="color: var(--pico-del-color); text-align: center;">{{ error }}</p>
    {% endif %}

    <form method="post" action="/admin/login" autocomplete="off">
        <input type="password" id="password" name="password" placeholder="Enter PIN" inputmode="none" readonly required>
        <div class="numpad">
            <button type="button" onclick="numPress('1')">1</button>
            <button type="button" onclick="numPress('2')">2</button>
            <button type="button" onclick="numPress('3')">3</button>
            <button type="button" onclick="numPress('4')">4</button>
            <button type="button" onclick="numPress('5')">5</button>
            <button type="button" onclick="numPress('6')">6</button>
            <button type="button" onclick="numPress('7')">7</button>
            <button type="button" onclick="numPress('8')">8</button>
            <button type="button" onclick="numPress('9')">9</button>
            <button type="button" class="btn-clear" onclick="numClear()">Clear</button>
            <button type="button" onclick="numPress('0')">0</button>
            <button type="button" class="btn-back" onclick="numBack()">&#9003;</button>
        </div>
        <button type="submit">Login</button>
    </form>
    <div class="back-link"><a href="/">&larr; Back to kiosk</a></div>
</section>
<script>
    var pinInput = document.getElementById('password');
    function numPress(d) { pinInput.value += d; }
    function numClear() { pinInput.value = ''; }
    function numBack() { pinInput.value = pinInput.value.slice(0, -1); }
</script>
{% endblock %}
