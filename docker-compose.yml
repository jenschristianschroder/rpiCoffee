
services:
  # ── classifier – coffee drink classifier ───────────────────────
  classifier:
    build:
      context: ./services/classifier
      dockerfile: Dockerfile
    container_name: rpicoffee-classifier
    ports:
      - "8001:8001"
    networks:
      - coffee-net
    restart: unless-stopped
    profiles:
      - classifier

  # ── llm – text generation ──────────────────────────────────────
  llm:
    build:
      context: ./services/llm
      dockerfile: Dockerfile
    container_name: rpicoffee-llm
    ports:
      - "8000:8000"
    environment:
      - OMP_NUM_THREADS=4
      - THREADS=4
    cpus: 4
    mem_limit: 2g
    networks:
      - coffee-net
    restart: unless-stopped
    profiles:
      - llm

  # ── tts – text-to-speech (Piper) ───────────────────────────────
  tts:
    build:
      context: ./services/tts
      dockerfile: Dockerfile
    container_name: rpicoffee-tts
    ports:
      - "5050:5000"
    networks:
      - coffee-net
    restart: unless-stopped
    profiles:
      - tts

  # ── remote-save – brew result persistence (Dataverse) ──────────
  remote-save:
    build:
      context: ./services/remote-save
      dockerfile: Dockerfile
    container_name: rpicoffee-remote-save
    ports:
      - "7000:7000"
    env_file:
      - ./services/remote-save/.env
    networks:
      - coffee-net
    restart: unless-stopped
    profiles:
      - remote-save

networks:
  coffee-net:
    driver: bridge
