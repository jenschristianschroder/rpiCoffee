
services:
  # ── app – main FastAPI application ─────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: rpicoffee-app
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - SENSOR_MODE=${SENSOR_MODE:-mock}
      - CLASSIFIER_ENDPOINT=http://classifier:${CLASSIFIER_PORT:-8001}
      - LLM_ENDPOINT=http://llm:${LLM_PORT:-8002}
      - TTS_ENDPOINT=http://tts:${TTS_PORT:-5050}
      - REMOTE_SAVE_ENDPOINT=http://remote-save:${REMOTE_SAVE_PORT:-7000}
      - SETTINGS_DIR=/data
      - DATA_DIR=/data
    networks:
      - coffee-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${APP_PORT:-8080}/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── classifier – coffee drink classifier ───────────────────────
  classifier:
    build:
      context: ./services/classifier
      dockerfile: Dockerfile
    container_name: rpicoffee-classifier
    ports:
      - "${CLASSIFIER_PORT:-8001}:${CLASSIFIER_PORT:-8001}"
    volumes:
      - ./app/data:/data
    environment:
      - MODEL_DIR=/data/models
      - TRAINING_DIR=/data/training
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.6}
    networks:
      - coffee-net
    restart: unless-stopped
    profiles:
      - classifier

  # ── llm – text generation ──────────────────────────────────────
  llm:
    build:
      context: ./services/llm
      dockerfile: Dockerfile
    container_name: rpicoffee-llm
    ports:
      - "${LLM_PORT:-8002}:${LLM_PORT:-8002}"
    environment:
      - OMP_NUM_THREADS=4
      - THREADS=4
    cpus: 4
    mem_limit: 2g
    networks:
      - coffee-net
    restart: unless-stopped
    profiles:
      - llm

  # ── tts – text-to-speech (Piper) ───────────────────────────────
  tts:
    build:
      context: ./services/tts
      dockerfile: Dockerfile
    container_name: rpicoffee-tts
    ports:
      - "${TTS_PORT:-5050}:${TTS_PORT:-5050}"
    networks:
      - coffee-net
    restart: unless-stopped
    profiles:
      - tts

  # ── remote-save – brew result persistence (Dataverse) ──────────
  remote-save:
    build:
      context: ./services/remote-save
      dockerfile: Dockerfile
    container_name: rpicoffee-remote-save
    ports:
      - "${REMOTE_SAVE_PORT:-7000}:${REMOTE_SAVE_PORT:-7000}"
    env_file:
      - ./services/remote-save/.env
    networks:
      - coffee-net
    restart: unless-stopped
    profiles:
      - remote-save

networks:
  coffee-net:
    driver: bridge
