
services:
  # ── Main application (always starts) ───────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: rpicoffee-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SETTINGS_DIR=/data
      - DATA_DIR=/data
    volumes:
      - coffee-data:/data
      - ./data:/data/csv-defaults:ro
    networks:
      - coffee-net
    restart: unless-stopped
    depends_on: []

  # ── classifier – coffee drink classifier ───────────────────────
  classifier:
    build:
      context: ./services/classifier
      dockerfile: Dockerfile
    container_name: rpicoffee-classifier
    ports:
      - "8001:8001"
    networks:
      - coffee-net
    restart: unless-stopped
    profiles:
      - classifier

  # ── llm – text generation ──────────────────────────────────────
  llm:
    build:
      context: ./services/llm
      dockerfile: Dockerfile
    container_name: rpicoffee-llm
    ports:
      - "8000:8000"
    networks:
      - coffee-net
    restart: unless-stopped
    profiles:
      - llm

  # ── tts – text-to-speech (Piper) ───────────────────────────────
  tts:
    build:
      context: ./services/tts
      dockerfile: Dockerfile
    container_name: rpicoffee-tts
    ports:
      - "5050:5000"
    networks:
      - coffee-net
    restart: unless-stopped
    profiles:
      - tts

  # ── remote-save – brew result persistence (Dataverse) ──────────
  remote-save:
    build:
      context: ./services/remote-save
      dockerfile: Dockerfile
    container_name: rpicoffee-remote-save
    ports:
      - "7000:7000"
    env_file:
      - ./services/remote-save/.env
    networks:
      - coffee-net
    restart: unless-stopped
    profiles:
      - remote-save

networks:
  coffee-net:
    driver: bridge

volumes:
  coffee-data:
    driver: local
