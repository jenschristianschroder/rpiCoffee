
services:
  # ── classifier – coffee drink classifier ───────────────────────
  classifier:
    build:
      context: ./services/classifier
      dockerfile: Dockerfile
    container_name: rpicoffee-classifier
    ports:
      - "${CLASSIFIER_PORT:-8001}:${CLASSIFIER_PORT:-8001}"
    volumes:
      - ./app/data:/data
    environment:
      - MODEL_DIR=/data/models
      - TRAINING_DIR=/data/training
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.6}
      - SETTINGS_DIR=/data
    networks:
      - coffee-net
    restart: unless-stopped
    profiles:
      - classifier

  # ── llm – text generation ──────────────────────────────────────
  llm:
    build:
      context: ./services/llm
      dockerfile: Dockerfile
    container_name: rpicoffee-llm
    ports:
      - "${LLM_PORT:-8002}:${LLM_PORT:-8002}"
    volumes:
      - llm-data:/data
    environment:
      - OMP_NUM_THREADS=4
      - THREADS=4
      - SETTINGS_DIR=/data
    cpus: 4
    mem_limit: 2g
    networks:
      - coffee-net
    restart: unless-stopped
    profiles:
      - llm

  # ── tts – text-to-speech (Piper) ───────────────────────────────
  tts:
    build:
      context: ./services/tts
      dockerfile: Dockerfile
    container_name: rpicoffee-tts
    ports:
      - "${TTS_PORT:-5050}:${TTS_PORT:-5050}"
    volumes:
      - tts-data:/data
    environment:
      - SETTINGS_DIR=/data
    networks:
      - coffee-net
    restart: unless-stopped
    profiles:
      - tts

  # ── remote-save – brew result persistence (Dataverse) ──────────
  remote-save:
    build:
      context: ./services/remote-save
      dockerfile: Dockerfile
    container_name: rpicoffee-remote-save
    ports:
      - "${REMOTE_SAVE_PORT:-7000}:${REMOTE_SAVE_PORT:-7000}"
    volumes:
      - remote-save-data:/data
    env_file:
      - ./services/remote-save/.env
    environment:
      - SETTINGS_DIR=/data
    networks:
      - coffee-net
    restart: unless-stopped
    profiles:
      - remote-save

networks:
  coffee-net:
    driver: bridge

volumes:
  llm-data:
  tts-data:
  remote-save-data:
