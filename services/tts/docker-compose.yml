services:
  tts:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-tts
    ports:
      - "${TTS_PORT:-5050}:${TTS_PORT:-5050}"
    volumes:
      # Persist downloaded voice models across rebuilds
      - tts-models:/app/models
      # Optional: mount a local output directory
      - ./output:/app/output
    restart: unless-stopped
    # Memory limit appropriate for Raspberry Pi (adjust as needed)
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  tts-models:
